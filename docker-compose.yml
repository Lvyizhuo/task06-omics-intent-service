version: '3.8'

services:
  omics-intent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omics-intent-service
    restart: unless-stopped
    network_mode: host  # 使用宿主机网络，可直接访问 localhost:8005
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./app:/app/app  # 挂载代码目录，修改代码后只需重启容器
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
