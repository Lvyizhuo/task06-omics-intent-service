version: '3.8'

services:
  omics-intent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omics-intent-service
    restart: unless-stopped
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - omics-network

networks:
  omics-network:
    driver: bridge
